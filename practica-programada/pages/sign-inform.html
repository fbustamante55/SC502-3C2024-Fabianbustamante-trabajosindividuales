<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <title>Registration Form</title>
    <link rel="stylesheet" href="../css/form_style.css" />
  </head>
  <body>
    <h1>sign-In form</Form></h1>
    <p>Por Favor llene la informacion requerida</p>
    <form method="post" action="/practica-programada-1/segunda-parte/PAGES/index.html">
      <fieldset>
        <label for="first-name">Nombre: <input id="first-name" name="first-name" type="text" required /></label>
        <label for="last-name">Apellido: <input id="last-name" name="last-name" type="text" required /></label>
        <label for="email">Email: <input id="email" name="email" type="email" required /></label>
        <label for="new-password">Contraseña: <input id="new-password" name="new-password" type="password" pattern="[a-z0-9]{8,}" required /></label>
      </fieldset>
      <fieldset>
        <legend>Tipo de Cuenta (requerido)</legend>
        <label for="personal-account"><input id="personal-account" type="radio" name="account-type" class="inline" checked /> Personal</label>
        <label for="business-account"><input id="business-account" type="radio" name="account-type" class="inline" /> Empresarial</label>
      </fieldset>
      <fieldset>
        <label for="profile-picture">Sube tu foto de perfil: <input id="profile-picture" type="file" name="file" /></label>
        <label for="age">Cual es tu edad: <input id="age" type="number" name="age" min="13" max="120" /></label>
        <label for="referrer">Como se enteró de nosotros?
          <select id="referrer" name="referrer">
            <option value="">(select one)</option>
            <option value="1">Linkedin</option>
            <option value="2">YouTube Channel</option>
            <option value="3">Forum</option>
            <option value="4">Other</option>
          </select>
        </label>
        <label for="bio">Proporciona una bio:
          <textarea id="bio" name="bio" rows="3" cols="30" placeholder="Me gusta programar en la playa..."></textarea>
        </label>
      </fieldset>
      <label for="terms-and-conditions">
        <input class="inline" id="terms-and-conditions" type="checkbox" required name="terms-and-conditions" /> Acepto los <a href="">términos y condiciones</a>
      </label>
      <input type="submit" value="Submit" />
    </form>
  </body>
</html>
